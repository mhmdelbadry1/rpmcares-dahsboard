  /api/patients:
    get:
      tags:
      - Patient Management|Patient
      summary: Gets list of Patients
      description: |
        This operation returns patients associated with a given **group_id**, with support for pagination via **page** and **size** parameters.

        The **page** parameter determines which page of results to retrieve. The default value is 1 if not provided.
        The **size** parameter defines the maximum number of patient records returned per page, with a default value of 100 if not specified.

        For each patient in the response, patient details along with additional related information is included where available:
        - **Devices** associated with the patient
        - **Programs** the patient is enrolled in
        - **Communication hold** status, if applicable
        - **Communication preferences**, if configured
        - **Patient Notes**, latest 3 notes. For the full set of patient notes, please refer to the Patient Notes API: GET **/api/patients/{patient_id}/note**.
      operationId: getPatientListByGroupId
      parameters:
      - name: page
        in: query
        description: Page number
        required: false
        schema:
          type: integer
          format: int32
          default: 1
      - name: size
        in: query
        description: Page size
        required: false
        schema:
          type: integer
          format: int32
          default: 100
      responses:
        "200":
          description: Patient List retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api_response_patient_list"
        "400":
          description: Problem processing request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api_response"
        "403":
          description: Not Authorized
          content:
            application/json:
              schema:
