name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-backend
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            mkdir -p /opt/rpmcares-backend
            cd /opt/rpmcares-backend

            if [ ! -f docker-compose.yml ]; then
              echo "docker-compose.yml missing on server — copy it from the repo's backend/docker-compose.yml first." >&2
              exit 1
            fi
            if [ ! -f .env ]; then
              echo ".env missing on server — create /opt/rpmcares-backend/.env with production secrets first." >&2
              exit 1
            fi

            export IMAGE=${{ env.IMAGE_NAME }}
            export TAG=${{ needs.build-and-push.outputs.tag }}

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

            # Traefik (shared with the n8n stack) reverse-proxies api.rpmcares.com
            # to this container by name over the docker network. It's been
            # observed to get stuck on the old container after this replaces it —
            # requests hang past the TLS handshake until Traefik is restarted —
            # so restart it here every deploy rather than requiring a manual fix.
            if docker ps --format '{{.Names}}' | grep -qx 'n8n-traefik-1'; then
              docker restart n8n-traefik-1
            fi
