components:
  schemas:
    api_response:
      type: object
      description: Common response for API calls
      properties:
        data:
          type: object
          description: Response data payload
        status:
          $ref: "#/components/schemas/status_response"
          description: Status response object
    status_response:
      type: object
      description: Status code and message for response
      properties:
        code:
          type: integer
          format: int32
          description: Http response code
        message:
          type: string
          description: Response message
    worklist_task_update:
      type: object
      description: Worklist Task item
      properties:
        assigned_user_id:
          type: integer
          format: int64
          description: User ID to which the task is assigned
          example: 100
        task_name:
          type: string
          description: Task name
        task_description:
          type: string
          description: Task description
        due_date:
          type: string
          format: date-time
          description: Task due date *(yyyy-MM-ddTHH:mm:ss)*
    address:
      type: object
      description: Address data structure
      properties:
        address1:
          type: string
          description: Address line 1
          example: 123
          maxLength: 255
        address2:
          type: string
          description: Address line 2
          example: Suite 200
          maxLength: 255
        city:
          type: string
          description: Address city
          example: Lake Mary
          maxLength: 255
        state:
          type: string
          description: Address state
          example: FL
          maxLength: 50
        postal_code:
          type: string
          description: Address postal code
          example: 33954
          maxLength: 50
        country:
          type: string
          description: Address country
          example: United States
          maxLength: 128
    api_response_patient_detail:
      type: object
      description: Api response containing patient detail
      properties:
        data:
          $ref: "#/components/schemas/patient_api_response"
          description: Response data payload
        status:
          $ref: "#/components/schemas/status_response"
          description: Status response object
    call:
      type: object
      description: Represents a phone call to the patient
      properties:
        id:
          type: integer
          format: int64
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        toNumber:
          type: string
        fromNumber:
          type: string
        isOutbound:
          type: boolean
        recordingUrl:
          type: string
