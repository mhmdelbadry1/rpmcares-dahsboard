              schema:
                $ref: "#/components/schemas/api_response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api_response"
    post:
      tags:
      - Patient Management|Patient
      summary: Create a new Patient.
      description: |
        This operation will create new patient.

        **Email** is optional and will be generated as GUID if omitted.

        **Timezone** will default to that of api key group if omitted.

        **Language** will default to English (eng) if omitted.  **Language** values should conform to ISO 639-3 three character codes. The language field is case-insensitive.

        Phone numbers (**mobile_phone**, **home_phone**) should conform to E.164 format.

        The optional **validate** field will indicate if the shipping address is to be validated. If **true**, the address will
        be validated. If it is determined that the address is not found, the service will return a **422** *(Unprocessable Entity)*.
        If the **validate** field is omitted or set to **false**, the patient will be created without shipping address validation.
      operationId: createNewPatient
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/patient"
        required: true
      responses:
        "201":
          description: Patient created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api_response_patient_detail"
        "400":
