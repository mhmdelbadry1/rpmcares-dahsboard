        in: query
        description: Page number
        required: false
        schema:
          type: integer
          format: int32
          default: 1
      - name: size
        in: query
        description: Page size (max of 1000)
        required: false
        schema:
          type: integer
          format: int32
          default: 100
      - name: alert_type
        in: query
        description: "Type of alert items to retrieve; leave empty for all. For more\
          \ details, For more information, refer to the endpoint **/api/patients/alert/type**\
          \ in the documentation."
        required: false
        schema:
          type: string
          default: all
      - name: alert_status
        in: query
        description: |-
          Read status of the alerts. Accepted values are:
           - **all**: Returns all alerts.
           - **read**: Returns only read alerts.
           - **unread**: Returns only unread alerts.
