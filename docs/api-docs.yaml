  /api/patients/search:
    get:
      tags:
      - Patient Management|Patient
      summary: Gets list of Patients matching criteria
      description: |
        Gets a list of Patients matching criteria.  Criteria must be:
         - **first_name, last_name and date_of_birth** OR
         - **email** OR
         - **phone** OR
         - **mrn** OR
         - **device_id** OR
         - **order_number**

        independently.  No other combinations are permitted.

        Returns patient details along with associated data including **devices**, **programs**, **communication holds**, **communication preferences**, and **patient notes**.

        **Patient notes** are limited to the latest three notes. For the complete list of **patient notes**, please refer to the Patient Notes API: GET **/api/patients/{patient_id}/note**.
      operationId: getPatientListByCriteria
      parameters:
      - name: first_name
        in: query
        description: Patient first name
        required: false
        schema:
          type: string
      - name: last_name
        in: query
        description: Patient last name
        required: false
        schema:
          type: string
      - name: email
        in: query
        description: Patient email address
        required: false
        schema:
          type: string
      - name: phone
        in: query
        description: Searches both patient mobile and home phone numbers
        required: false
        schema:
          type: string
      - name: date_of_birth
        in: query
        description: "Date of birth format is **yyyy-MM-dd**. \n\n *Example*: 2024-01-01"
        required: false
        schema:
          type: string
          format: date
      - name: mrn
        in: query
        description: Patient medical record number (mrn)
        required: false
        schema:
          type: string
      - name: device_id
        in: query
        description: Search for patient assigned this device
        required: false
        schema:
          type: string
      - name: order_number
        in: query
        description: Search for patient associated with this order
        required: false
        schema:
          type: string
      responses:
        "200":
          description: Patient List retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api_response_patient_list"
        "400":
          description: Problem processing request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api_response"
