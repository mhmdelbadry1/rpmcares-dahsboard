  /api/patients/{patient_id}:
    get:
      tags:
      - Patient Management|Patient
      summary: Get a Patient
      description: |
        Retrieves detailed information for a single patient by **patient_id**.

        Returns patient details along with associated data including **devices**, **programs**, **communication hold**, **communication preferences**, and **patient notes**.

        **Patient notes** are limited to the latest three notes. For the complete list of **patient notes**, please refer to the Patient Notes API: GET /api/patients/{patient_id}/note.
      operationId: getPatientDetailsByPatientId
      parameters:
      - name: patient_id
        in: path
        description: Patient ID
        required: true
        schema:
          type: integer
          format: int64
      responses:
