  /api/orders:
    get:
      tags:
      - Order Management|Order
      summary: Get all orders for date range
      description: Retrieves all Orders associated with the group for date range.
        Date range must be 30 days or less and will default to last 30 days if date
        range not provided
      operationId: getOrders
      parameters:
      - name: start_date
        in: query
        description: "The start date for the query in ISO format (yyyy-MM-dd). This\
          \ parameter is optional. Requires end_date. \n\n *Example*: 2024-01-01"
        required: false
        schema:
          type: string
          format: date
      - name: end_date
        in: query
        description: "The end date for the query in ISO format (yyyy-MM-dd). This\
          \ parameter is optional. Requires start_date. \n\n *Example*: 2024-01-30"
        required: false
        schema:
          type: string
          format: date
      responses:
        "200":
          description: Orders retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api_response_orders"
        "403":
          description: Not Authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api_response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api_response"
    post:
      tags:
      - Order Management|Order
      summary: Create an Order
      description: |
        This operation will create and place an order.


        The **order_number** field should be a number unique to your organization and can be used to identity devices
        shipped under the order after order has been processed.  The customer name and number can be any data that would
        be meaningful to your organization


        The **shipping_method** field support the following methods:
        - **MAIL** = Standard
        - **MAIL_SIG** = Standard + Signature
        - **UP2** = Overnight
        - **UP2_SIG** = Overnight + Signature


        The optional **validate** field will indicate if the order address is to be validated. If **true**, the address will
        be validated. If it is determined that the address is not found, the service will return a **422** *(Unprocessable Entity)*.
        If the **validate** field is omitted or set to **false**, the order will be subject to an additional fee if the address
        is not found.


        Note that the inclusion of the **patient** or **patient_id** are optional and
        should only be used if patient management functionality is used on the Smart Meter portal.  If a valid
        patient_id or new patient structure is included with the order, the device(s) shipped will be assigned to
        the existing or newly created patient within the Smart Meter portal.  Also note that if a patient structure
        is included, the first_name, last_name, and dob fields will be used to check for an existing patient.
        If found, the ordered device will be assigned to that patient. If more than one patient is found for those fields,
        the mrn value will be used to determine which patient to assign the device to.
      operationId: createOrder
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/order_creation"
        required: true
      responses:
        "200":
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api_response_order_creation"
        "400":
          description: Problem processing request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api_response"
        "403":
          description: Not Authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api_response"
        "422":
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api_response"
        "429":
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api_response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api_response"
