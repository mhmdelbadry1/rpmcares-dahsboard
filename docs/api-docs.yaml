  /api/readings:
    post:
      tags:
      - Readings Management|Readings
      summary: Retrieves readings
      description: |
        Retrieves readings leveraging a set of optional filters .Either the **date_start/date_end**
        or **ingest_date_start/ingest_date_end** (*in the ISO-8601 calendar system, such as 2007-12-03T10:15:30*)
        must be constrained to less than or equal to a 31
        day period. Device ids can be optionally passed in the **device_ids** array to target specific devices.
        Reading type values can be optionally passed int the **reading_type** field to target specific types of
        readings. Valid reading_type values include:
        - **blood_glucose**
        - **blood_pressure**
        - **pulse_ox**
        - **weight**
        - **fibricheck**
        - **thermometer**

        Omitting the “reading_type” parameter will return all applicable readings regardless of type.


        All timestamps are expressed in GMT+0. Conversion to local time can be accomplished by
        applying the timezone offset expressed in hours.To convert a timestamp from GMT+0 to the
        user's local time, add or subtract the respective timezone offset in hours. For instance,
        if the **time_zone_offset** field returns -5, subtract 5 hours from the **date_recorded** field.
        If the **time_zone_offset** field returns 3, add 3 hours to the **date_recorded** field.


        The **battery** field within the readings data is an integer (0–100) representing the estimated remaining battery capacity of the device,
        expressed as a percentage, at the time the measurement was recorded.


        The **event_flag** field within the readings data has these possible values:
        - **0**: Before Meal
        - **1**: After Meal
        - **2**: Control Solution
        - **3**: Mock Test
        - **4**: Thermometer Measurement Mode: Ear
        - **5**: Thermometer Measurement Mode: Frontal
        - **null**: no flags available

        The **signal_strength** field within the readings data represents a normalized measure of signal strength on a scale from **1 (poor) to 5 (strong)**. A value of **-1** denotes that the signal strength could not be determined.
      operationId: getReadings
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/readings_request"
        required: true
      responses:
        "200":
          description: Readings retrieved successfully
          content:
            application/json:
              schema:
