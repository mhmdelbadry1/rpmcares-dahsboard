        "404":
          description: Patient id not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api_response"
        "429":
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api_response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api_response"
    put:
      tags:
      - Patient Management|Patient
      summary: Update fields on a Patient
      description: |
        This operation will update fields on a patient.

        **Date times** are in ISO standard, Ex: "2023-11-11T11:55".

        **Timezone** will default to that of api key group if omitted.

        **Language** will default to English (eng) if omitted.  **Language** values should conform to ISO 639-3 three character codes. The language field is case-insensitive.

        Phone numbers (**mobile_phone**, **home_phone**) are in E.164 format, Ex: "+14151231234".

        The optional **validate** field will indicate if the shipping address is to be validated. If **true**, the address will
        be validated. If it is determined that the address is not found, the service will return a **422** *(Unprocessable Entity)*.
        If the **validate** field is omitted or set to **false**, the patient will be updated without shipping address validation.


        **Note**: a sparse object containing only fields to update can be passed to
        this service.  Full structure/schema is not necessary, but updated_by user id is required.
      operationId: updateGeneralInfo
      parameters:
      - name: patient_id
        in: path
        description: Patient ID
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/patient_update"
        required: true
      responses:
        "200":
          description: Patient field updated successfully
          content:
